sequences:
  - name: fill
    steps:
      - valve: lffv
        action: open
        time_delay: 0.0
        user_input: true
        condition_valve: null
        condition_state: null

      - valve: otvv
        action: open
        time_delay: 0.0
        user_input: true
        condition_valve: offv
        condition_state: open

      - valve: offv
        action: open
        time_delay: 0.0
        user_input: false
        condition_valve: lffv
        condition_state: open

      - valve: offv
        action: close
        time_delay: 0.0
        user_input: false
        condition_valve: otvv
        condition_state: open

      - valve: otvv
        action: open
        time_delay: 0.0
        user_input: false
        condition_valve: offv
        condition_state: close

      - valve: xffv
        action: open



  - name: fire
    steps:
      - valve: omv
        action: open
        time_delay: 0.0
        user_input: false
        condition_valve: xffv
        condition_state: open

      - valve: fmv
        action: open
        time_delay: 0.0
        user_input: true
        condition_valve: omv
        condition_state: open

      - valve: wmv
        action: open
        time_delay: 0.0
        user_input: false
        condition_valve: fmv
        condition_state: open

      - valve: igniter
        action: open
        time_delay: 0.0
        user_input: false
        condition_valve: wmv
        condition_state: open

      - valve: fifv
        action: open
        time_delay: 0.0
        user_input: false
        condition_valve: wmv
        condition_state: open

      - valve: oifv
        action: open
        time_delay: 2.0
        user_input: false
        condition_valve: fifv
        condition_state: open

      - valve: omctv
        action: open
        time_delay: 0.0
        user_input: false
        condition_valve: oifv
        condition_state: open

      - valve: fmctv
        action: open
        time_delay: 2.0
        user_input: false
        condition_valve: omctv
        condition_state: open

      - valve: fifv
        action: close
        time_delay: 0.0
        user_input: false
        condition_valve: wmv
        condition_state: open

      - valve: oifv
        action: close
        time_delay: 2.0
        user_input: false
        condition_valve: fifv
        condition_state: open

      - valve: igniter
        action: close
        time_delay: 0.0
        user_input: false
        condition_valve: oifv
        condition_state: close

      - valve: lffv
        action: close
        time_delay: 0.0
        user_input: false
        condition_valve: igniter
        condition_state: close

      - valve: xffv
        action: close
        time_delay: 0.0
        user_input: true
        condition_valve: lffv
        condition_state: close